/* ===== v24 Premium UI ===== */
:root{
  --g:#176b45;
  --g2:#0d5033;
  --r:#c8102e;
  --r2:#a70c25;
  --cream:#fff8ed;
  --cream2:#f8eddd;
  --surface:#fffdf8;
  --surface-strong:#fff7e8;
  --line:#eadfce;
  --ink:#26231f;
  --muted:#776f66;
  --shadow:0 14px 34px rgba(73,48,24,.11);
  --shadow-hover:0 22px 48px rgba(73,48,24,.18);
}
html{background:var(--cream)}
body{
  background:
    radial-gradient(circle at 12% 4%,rgba(200,16,46,.055),transparent 28%),
    radial-gradient(circle at 88% 16%,rgba(23,107,69,.06),transparent 26%),
    linear-gradient(180deg,#fffaf2 0%,#f8efe2 100%);
  background-attachment:fixed;
  color:var(--ink);
}
.app{overflow-x:hidden}
.head{
  height:88px;
  background:linear-gradient(115deg,var(--g2),var(--g) 55%,#1c7650);
  box-shadow:0 7px 22px rgba(12,65,41,.24);
  border-bottom:1px solid rgba(255,255,255,.14);
}
.brandLogo{
  background:rgba(255,255,255,.96);
  border-radius:14px;
  padding:5px;
  box-shadow:0 6px 18px rgba(0,0,0,.18);
}
.progress{
  background:rgba(255,253,248,.94);
  backdrop-filter:blur(16px);
  padding:12px 20px;
  box-shadow:0 8px 24px rgba(85,60,35,.06);
}
.progress span{
  background:#eee5d7;
  color:#6d6257;
  border:1px solid transparent;
  transition:transform .22s ease,background .22s ease,box-shadow .22s ease;
}
.progress .on{
  background:linear-gradient(135deg,var(--r),#e4314c);
  box-shadow:0 6px 16px rgba(200,16,46,.23);
  transform:translateY(-1px);
}
.progress .done{background:linear-gradient(135deg,var(--g2),var(--g))}
.stage{padding:32px 28px 110px}
.title{
  font-size:38px;
  letter-spacing:-1.2px;
  color:#28231e;
  text-shadow:0 1px 0 #fff;
}
.sub{color:var(--muted);font-size:15px}
.grid{gap:20px}
.card{
  overflow:hidden;
  background:
    linear-gradient(155deg,rgba(255,255,255,.95),rgba(255,247,232,.96));
  border:1px solid rgba(226,209,187,.9);
  border-radius:24px;
  padding:20px;
  box-shadow:var(--shadow);
  transform:translateY(0) scale(1);
  transition:
    transform .18s cubic-bezier(.2,.8,.2,1),
    box-shadow .18s ease,
    border-color .18s ease,
    background .18s ease;
  animation:cardIn .38s both;
}
.grid .card:nth-child(2){animation-delay:.035s}
.grid .card:nth-child(3){animation-delay:.07s}
.grid .card:nth-child(4){animation-delay:.105s}
.grid .card:nth-child(5){animation-delay:.14s}
.grid .card:nth-child(6){animation-delay:.175s}
.grid .card:nth-child(n+7){animation-delay:.21s}
.card::after{
  content:"";
  position:absolute;
  inset:auto -35% -70% auto;
  width:150px;height:150px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(200,16,46,.08),transparent 68%);
  pointer-events:none;
}
.card:hover{
  transform:translateY(-6px) scale(1.012);
  box-shadow:var(--shadow-hover);
  border-color:rgba(200,16,46,.45);
}
.card:active{
  transform:translateY(-1px) scale(.985);
  transition-duration:.08s;
}
.card.active{
  border:2px solid var(--r);
  background:linear-gradient(155deg,#fff,#fff2ed);
  box-shadow:0 0 0 4px rgba(200,16,46,.10),var(--shadow-hover);
}
.card h2,.card h3{letter-spacing:-.45px}
.badge{
  right:12px;top:12px;
  background:linear-gradient(135deg,var(--r),#e62f4b);
  box-shadow:0 7px 16px rgba(200,16,46,.22);
}
.pic{
  height:164px;
  border-radius:19px;
  background-color:#f8efe2;
  box-shadow:inset 0 0 0 1px rgba(225,207,183,.72);
  transition:transform .25s cubic-bezier(.2,.8,.2,1);
}
.card:hover .pic{transform:scale(1.035)}
.imagePic img{transition:transform .4s cubic-bezier(.2,.8,.2,1)}
.card:hover .imagePic img{transform:scale(1.055)}
.crustCard{min-height:430px}
.crustPic{
  height:230px;
  background:linear-gradient(160deg,#fff,#f7ecdc);
  border:1px solid #eadcc8;
  box-shadow:inset 0 1px 0 #fff;
}
.crustPic img{transition:transform .35s ease}
.crustCard:hover .crustPic img{transform:scale(1.06) rotate(-.4deg)}
.price{
  color:var(--r);
  font-size:23px;
  letter-spacing:-.6px;
}
.muted{color:var(--muted);line-height:1.45}
.tabs button{
  border:1px solid #ded0bd;
  background:rgba(255,253,248,.9);
  box-shadow:0 5px 13px rgba(80,56,33,.05);
  transition:.16s ease;
}
.tabs button:hover{transform:translateY(-2px);border-color:var(--r)}
.tabs .active{
  background:linear-gradient(135deg,var(--g2),var(--g));
  box-shadow:0 8px 18px rgba(23,107,69,.22);
}
.summary{
  background:linear-gradient(145deg,#fffdf8,#fff7ea);
  border:1px solid #eadcc8;
  box-shadow:var(--shadow);
  animation:panelIn .35s ease both;
}
.row{border-bottom-color:#e4d7c5}
.cartbar{
  height:80px;
  background:rgba(27,34,29,.95);
  backdrop-filter:blur(18px);
  box-shadow:0 -10px 34px rgba(37,25,15,.22);
  border-top:1px solid rgba(255,255,255,.08);
}
.cartprice{color:#ffe7b4;font-size:22px}
.cartbar button{
  min-height:48px;
  border-radius:14px;
  transition:transform .14s ease,box-shadow .14s ease,filter .14s ease;
}
.cartbar button:active{transform:scale(.94)}
.prev{background:#f1e8dc;color:#352f29}
.next{
  background:linear-gradient(135deg,var(--r2),var(--r),#df2a46);
  box-shadow:0 8px 20px rgba(200,16,46,.27);
}
.next:hover{filter:brightness(1.06);box-shadow:0 11px 25px rgba(200,16,46,.34)}
.hero{
  background:
    radial-gradient(circle at 20% 18%,rgba(255,255,255,.12),transparent 29%),
    radial-gradient(circle at 85% 75%,rgba(200,16,46,.22),transparent 30%),
    linear-gradient(135deg,#0d5033,#176b45 55%,#113c29);
}
.heroBox{
  position:relative;
  overflow:hidden;
  background:linear-gradient(150deg,rgba(255,255,255,.98),rgba(255,247,232,.98));
  border:1px solid rgba(255,255,255,.7);
  box-shadow:0 28px 65px rgba(0,0,0,.24);
  animation:heroIn .65s cubic-bezier(.2,.8,.2,1) both;
}
.heroBox::before{
  content:"";
  position:absolute;
  width:360px;height:360px;
  border-radius:50%;
  right:-190px;top:-210px;
  background:radial-gradient(circle,rgba(200,16,46,.13),transparent 66%);
}
.heroLogo{filter:drop-shadow(0 8px 13px rgba(200,16,46,.12))}
.hero h1{letter-spacing:-2px;line-height:1.16}
.start{
  background:linear-gradient(135deg,var(--r2),var(--r),#e3304d);
  box-shadow:0 12px 30px rgba(200,16,46,.28);
  transition:transform .17s ease,box-shadow .17s ease,filter .17s ease;
  position:relative;
  overflow:hidden;
}
.start:hover{transform:translateY(-3px) scale(1.015);box-shadow:0 17px 35px rgba(200,16,46,.34)}
.start:active{transform:scale(.97)}
.modal{
  background:linear-gradient(145deg,#fffdf9,#fff5e7);
  border:1px solid rgba(255,255,255,.75);
  box-shadow:0 30px 70px rgba(0,0,0,.3);
  animation:modalIn .24s cubic-bezier(.2,.8,.2,1) both;
}
.backdrop{animation:fadeIn .18s ease both}
.keypad button,.qty button{
  box-shadow:0 5px 12px rgba(80,54,29,.07);
  transition:transform .12s ease,background .12s ease;
}
.keypad button:active,.qty button:active{transform:scale(.92);background:#f5e5d5}
.phoneDisplay{background:#fffaf2;border-color:#dccdb8}
.done{animation:panelIn .4s ease both}
.stage>*{animation:pageIn .3s cubic-bezier(.2,.8,.2,1) both}

/* 터치 리플 */
.ripple{
  position:fixed;
  border-radius:50%;
  transform:translate(-50%,-50%) scale(0);
  background:rgba(255,255,255,.56);
  pointer-events:none;
  z-index:9999;
  animation:ripple .5s ease-out forwards;
}

@keyframes pageIn{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(18px) scale(.985)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
@keyframes panelIn{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes heroIn{
  from{opacity:0;transform:translateY(26px) scale(.97)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
@keyframes modalIn{
  from{opacity:0;transform:translateY(18px) scale(.965)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes ripple{
  to{transform:translate(-50%,-50%) scale(7);opacity:0}
}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
}
@media(max-width:560px){
  .stage{padding:20px 14px 100px}
  .card{border-radius:20px;padding:16px}
  .pic{height:150px}
  .cartbar{height:74px}
}


/* v25 도우 이미지 최적화 */
.crustPic{background:linear-gradient(160deg,#fffdf9,#f9efe2)}
.crustPic img{object-fit:contain;max-width:100%;max-height:100%;padding:6px}


/* ===== v30 먹고가기 좌석 선택 ===== */
.partyGrid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:15px;max-width:820px;margin:0 auto}
.partyCard,.areaCard,.tableCard{
  position:relative;border:1px solid #dfcfba;border-radius:22px;background:linear-gradient(145deg,#fff,#fff6e7);
  box-shadow:0 9px 22px rgba(73,48,24,.08);transition:.16s ease;overflow:hidden
}
.partyCard{aspect-ratio:1/1;padding:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.partyCard:hover:not(:disabled),.areaCard:hover:not(:disabled),.tableCard:hover:not(:disabled){transform:translateY(-4px);border-color:rgba(200,16,46,.48)}
.partyCard.selected,.areaCard.selected,.tableCard.selected{border:2px solid var(--r);background:linear-gradient(145deg,#fff,#fff0eb);box-shadow:0 0 0 4px rgba(200,16,46,.09),0 14px 30px rgba(73,48,24,.14)}
.partyNumber{font-size:38px;font-weight:1000;color:var(--r);line-height:1}
.areaGrid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px}
.areaCard{aspect-ratio:1/1;padding:18px;text-align:left;display:flex;flex-direction:column;justify-content:space-between}
.areaIcon{font-size:36px}
.areaCard.disabled,.areaCard:disabled,.tableCard:disabled{opacity:.36;filter:grayscale(.75);cursor:not-allowed;background:#ddd8d0;border-color:#c9c3bb;box-shadow:none}
.areaCard.disabled::before,.areaCard:disabled::before,.tableCard:disabled::before{content:"선택 불가";position:absolute;left:10px;top:10px;padding:5px 8px;border-radius:999px;background:#5f5b56;color:#fff;font-size:11px;font-weight:900}
.tableGrid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px}
.tableCard{min-height:180px;padding:18px;text-align:left;display:flex;flex-direction:column;justify-content:space-between}
.tableCard .capacity{font-size:26px;font-weight:1000;color:var(--r)}
.tableCard .status{font-size:12px;font-weight:900;color:var(--muted)}
.seatSummary{max-width:820px;margin:20px auto 0;padding:18px;border-radius:18px;background:#f3e8da;font-weight:900;text-align:center}
.seatSummary.ready{background:#e7f3eb;color:var(--g)}
.occupancyNote{max-width:820px;margin:12px auto;color:var(--muted);font-size:13px;text-align:center}
@media(max-width:900px){.partyGrid,.areaGrid,.tableGrid{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media(max-width:520px){.partyGrid,.areaGrid,.tableGrid{grid-template-columns:1fr}.partyCard,.areaCard{aspect-ratio:auto;min-height:160px}}


/* ===== v31 인원 선택 스테퍼 ===== */
.partyStepperWrap{
  width:min(100%,720px);
  margin:0 auto;
  padding:38px 30px;
  border-radius:30px;
  background:linear-gradient(145deg,#fffefb,#fff7e9);
  border:1px solid #dfd2bf;
  box-shadow:0 20px 48px rgba(63,43,24,.13);
  text-align:center;
}
.partyPeopleIcon{
  width:96px;height:96px;margin:0 auto 22px;
  display:grid;place-items:center;
  border-radius:50%;
  background:linear-gradient(145deg,#e5f3ec,#cfe7db);
  color:var(--g);
  font-size:47px;
  box-shadow:inset 0 0 0 1px rgba(23,107,69,.12);
}
.partyStepper{
  display:grid;
  grid-template-columns:132px minmax(240px,1fr) 132px;
  gap:18px;
  align-items:center;
  margin:0 auto 18px;
}
.partyStepBtn{
  height:132px;
  border:4px solid var(--g);
  border-radius:30px;
  background:#eff8f3;
  color:var(--g);
  font-size:58px;
  font-weight:1000;
  box-shadow:0 9px 22px rgba(23,107,69,.12);
  transition:transform .13s ease,opacity .13s ease,background .13s ease;
}
.partyStepBtn:hover:not(:disabled){transform:translateY(-3px);background:#e5f3eb}
.partyStepBtn:active:not(:disabled){transform:scale(.94)}
.partyStepBtn:disabled{opacity:.28;filter:grayscale(.7);cursor:not-allowed}
.partyCountDisplay{
  height:142px;

/* ===== v41 DESIGN SYSTEM / CONTRAST / ICONS ===== */
:root{
  --pj-green-950:#001b13;
  --pj-green-900:#00251b;
  --pj-green-800:#073d2d;
  --pj-green-700:#0b5a40;
  --pj-green-600:#0f7a53;
  --pj-red:#d7192d;
  --pj-red-dark:#a70e20;
  --pj-gold:#d6aa3b;
  --pj-cream:#fff8ed;
  --pj-cream-2:#f4eadc;
  --pj-ink:#171814;
  --pj-muted:#5f625d;
  --pj-line:#decfba;
}
body{background:linear-gradient(145deg,var(--pj-green-950),#003126 52%,#001a12);color:#fff}
.stage{animation:pageIn .22s ease both}
@keyframes pageIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes popIn{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}
@keyframes checkPop{0%{transform:scale(.5)}70%{transform:scale(1.18)}100%{transform:scale(1)}}

/* line icon system */
.uiIcon{width:1em;height:1em;display:inline-block;vertical-align:-.16em;fill:none;stroke:currentColor;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.iconBox{width:76px;height:76px;border-radius:22px;display:grid;place-items:center;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.13);color:#fff}
.iconBox .uiIcon{width:38px;height:38px}
.iconSmall .uiIcon{width:24px;height:24px}
.iconTiny .uiIcon{width:18px;height:18px}

/* light-card typography: force readable contrast */
.card,.summary,.modal,.upsellModal,.finalUpsellModal,.benefitHelperModal,
.tableCard,.partyStepperWrap,.wheelCol,.phoneDisplay,.notice,
.reviewPriceBreakdown,.cartItemsPanel,.benefitCompareBox{
  color:var(--pj-ink);
}
.card h1,.card h2,.card h3,.card h4,
.summary h1,.summary h2,.summary h3,

function roomAccessRule(){

 const n=state.partySize||0;
 // 최초 이용: 룸이 완전히 비어 있을 때
 if(r.occupiedCount===0){
   if(n>=6&&n<=8)return {enabled:true,requiredTables:2,maxTables:2,mode:'first_6_8',message:'4인 테이블 2개 사용'};
   if(n>=9&&n<=12)return {enabled:true,requiredTables:3,maxTables:3,mode:'exclusive',message:'룸 전체 단독 사용'};
   return {enabled:false,requiredTables:0,maxTables:0,mode:'blocked',message:'최초 입실은 6명 이상'};
 }

   if(n===4)return {enabled:true,requiredTables:1,maxTables:1,mode:'second_4',message:'남은 4인 테이블 1개 사용'};
   return {enabled:false,requiredTables:0,maxTables:0,mode:'blocked',message:'추가 입실은 4명만 가능'};
 }
 // 한 테이블만 점유된 비정상 상태는 안전하게 추가 입실 차단
 if(r.occupiedCount===1){
   return {enabled:false,requiredTables:0,maxTables:0,mode:'blocked',message:'룸 좌석 상태 확인 필요'};
 }
 // 세 테이블 모두 사용 중
 return {enabled:false,requiredTables:0,maxTables:0,mode:'full',message:'룸 전체 사용 중'};
}

function benefitName(id){return ({normal:'일반주문',takeout:'포장 20%',happy:'해피아워',upup:'UP & UP',set:'세트메뉴'})[id]||id}

function selectedItemCosts(map,master,filterFn){
 return Object.entries(map||{}).flatMap(([id,q])=>{const item=master.find(x=>x.id===id);if(!item||!filterFn(item))return[];return Array.from({length:Number(q)||0},()=>Number(item.price)||0)}).sort((a,b)=>b-a)
}
function remainingFeeAfterSetInclusions(n){
 const sideSlots=n===4?2:1;
 const eligibleSides=selectedItemCosts(state.extraSides,SIDES,x=>n===2?!!x.set2:!!x.set);
 const eligibleDrinks=selectedItemCosts(state.extraDrinks,DRINKS,x=>n===2?!!x.small:!!x.large);
 const includedSideValue=eligibleSides.slice(0,sideSlots).reduce((a,b)=>a+b,0);
 const includedDrinkValue=eligibleDrinks.slice(0,1).reduce((a,b)=>a+b,0);
 return Math.max(0,sideFee()-includedSideValue)+Math.max(0,drinkFee()-includedDrinkValue)
}
function benefitCandidatePrice(id){

 const side=sideFee(),drink=drinkFee(),tops=topFee(),half=state.mode==='half'?SETTINGS.HALF_EXTRA:0;
 const size=effectiveSize();

  if(state.orderType!=='takeout'||!['L','F'].includes(size))return Infinity;
  const product=(state.mode==='half'?((po(state.left)[size]+po(state.right)[size])/2):p[size])+half+crustFee()+tops;
  return product-Math.round(product*(SETTINGS.PACK_DISCOUNT/100))+side+drink
 }
 if(id==='happy'){
  if(state.orderType!=='takeout'||size!=='R'||state.mode==='half')return Infinity;
  return SETTINGS.HAPPY_PRICE+tops+side+drink

 if(id==='upup'){
  if(!p.L||!p.F)return Infinity;

  if(state.mode==='half')return Infinity;
  const n=size==='R'?2:size==='L'?3:4;

function comparableBenefitIds(){
 // 같은 이용방법·피자 구성·사이즈를 유지하는 혜택만 비교합니다.
 // 세트는 포함 메뉴 구성이 다르므로 일반 주문 혜택과 교차 비교하지 않습니다.

 if(state.orderType==='takeout'&&['L','F'].includes(effectiveSize()))ids.push('takeout');

}
function bestBenefitSuggestion(){

 for(const id of comparableBenefitIds()){
  const v=benefitCandidatePrice(id);
  if(Number.isFinite(v)&&v<current&&(!best||v<best.price))best={id,price:v,saving:current-v,currentPrice:current}
 }
 if(!best||best.id===(state.promo||'normal'))return null;

}

async function joinWaitlist(seatId){const t=Object.values(DINING_TABLES).flat().find(x=>x.id===seatId);if(!t)return;const raw=prompt('줄서기 연락처를 입력해 주세요. (010 포함 11자리)','010');if(raw===null)return;const phone=raw.replace(/\D/g,'');if(!/^010\d{8}$/.test(phone))return alert('010으로 시작하는 11자리 전화번호를 입력해 주세요.');const party=Number(prompt('이용 인원을 입력해 주세요.',String(state.partySize||2)));if(!party||party<1)return;const ref=await db.collection('waitlist').add({seatId,seatName:t.name,partySize:party,phone,phoneMasked:phone.slice(0,3)+'-****-'+phone.slice(-4),status:'waiting',createdAt:firebase.firestore.FieldValue.serverTimestamp(),createdAtClient:new Date().toISOString()});let ids=[];try{ids=JSON.parse(localStorage.getItem('pj_waitlist_ids')||'[]')}catch(e){}ids.push(ref.id);localStorage.setItem('pj_waitlist_ids',JSON.stringify([...new Set(ids)]));alert(`${t.name} 줄서기가 등록되었습니다.`)}

function reserveLimit(){let d=new Date();d.setHours(state.happyReserveOnly?20:21,state.happyReserveOnly?0:20,0,0);return d}function reserveStart(){let d=new Date(Date.now()+30*60000);d.setMinutes(Math.ceil(d.getMinutes()/10)*10,0,0);if(state.happyReserveOnly){let h=new Date();h.setHours(16,0,0,0);if(d<h)d=h}return d}function hasReserveSlots(){return reserveStart()<=reserveLimit()}function reserveWheelData(){let start=reserveStart(),limit=reserveLimit(),hours=[];if(start<=limit){for(let h=start.getHours();h<=limit.getHours();h++){let hh=String(h).padStart(2,'0');if(validMinutesForHour(hh,start).length)hours.push(hh)}}if(!state.reserveHour||!hours.includes(state.reserveHour))state.reserveHour=hours[0]||null;if(state.reserveHour){let valid=validMinutesForHour(state.reserveHour,start);if(!valid.includes(state.reserveMinute))state.reserveMinute=valid[0]||null}return{hours,minutes:state.reserveHour?validMinutesForHour(state.reserveHour,start):[]}}function validMinutesForHour(h,start){let limit=reserveLimit();return ['00','10','20','30','40','50'].filter(m=>{let d=new Date();d.setHours(Number(h),Number(m),0,0);return d>=start&&d<=limit})}function setReserveHour(h){state.reserveHour=h;let mins=validMinutesForHour(h,reserveStart());if(!mins.includes(state.reserveMinute))state.reserveMinute=mins[0]||null;render()}function setReserveMinute(m){state.reserveMinute=m;render()}function validReserveSelection(){if(!state.reserveHour||!state.reserveMinute)return false;let d=new Date();d.setHours(Number(state.reserveHour),Number(state.reserveMinute),0,0);return d>=new Date(Date.now()+30*60000)&&d<=reserveLimit()&&d.getDate()===new Date().getDate()}function confirmReserve(){if(!validReserveSelection())return;state.reserveTime=state.reserveHour+':'+state.reserveMinute;state.step=state.happyReserveOnly?'pizza':'promo';render()}function pressPhone(n){if(state.phone.length<8){state.phone+=n;render()}}function backPhone(){state.phone=state.phone.slice(0,-1);render()}function clearPhone(){state.phone='';render()}function formatPhone(v){let x=v.replace(/\D/g,'').slice(0,8);return '010-'+(x.slice(0,4).padEnd(4,'•'))+'-'+(x.slice(4,8).padEnd(4,'•'))}function validPhone(){return /^\d{8}$/.test(state.phone)}function last4(){return state.phone.slice(-4)}
function mobilePhoneFull(){return '010'+state.phone}
function mobileMaskedPhone(){return '010-****-'+last4()}
function mobileItemMap(map,master,category){
 return Object.entries(map||{}).filter(([,q])=>Number(q)>0).map(([id,q])=>{
  const item=master.find(x=>x.id===id)||{};
  return {id,name:item.name||id,category,quantity:Number(q)}
 })
}
function buildMobileOrderPayload(){
 const p=po(state.left),right=po(state.right),finalTotal=price().total+cartTotal();
 const items=[{
  id:'mobile-'+Date.now(),
  promo:state.promo||'normal',set:state.set||null,size:effectiveSize(),mode:state.mode,

  toppings:{...(state.toppings||{})},

  includedSides:{...(state.setSides||{})},

 }];
 return {

  pickup:state.orderType==='takeout'?{time:state.reserveTime||null,mode:state.orderTiming||'now'}:null,
  items,itemCount:1+(state.cartItems?.length||0),normalAmount:finalTotal,discountAmount:0,totalAmount:finalTotal,total:finalTotal,
  benefit:state.promo||'normal',payment:{method:state.paymentMethod,methodName:paymentName(state.paymentMethod),splitCount:isSplitPayment()?state.splitCount:1,splitAmounts:isSplitPayment()?splitParts(finalTotal,state.splitCount):[finalTotal]},status:'payment_pending',
  recommendationEvents:[],
  createdAt:firebase.firestore.FieldValue.serverTimestamp(),
  createdAtClient:new Date().toISOString(),
  source:'mobile-kiosk-v43.7'
 }
}
async function submitMobileOrder(){
 const payload=buildMobileOrderPayload();
 const orderRef=db.collection('orders').doc();
 const batch=db.batch();
 batch.set(orderRef,payload);
 if(state.orderType==='dinein'&&state.selectedTables.length){
  state.selectedTables.forEach(id=>{
   batch.set(db.collection('seats').doc(id),{
    status:'occupied',
    partySize:state.partySize||null,
    orderNo:state.orderNo,
    orderId:orderRef.id,
    occupiedAt:firebase.firestore.FieldValue.serverTimestamp(),
    updatedAt:firebase.firestore.FieldValue.serverTimestamp()
   },{merge:true});
  });
 }
 await batch.commit();
 state.firebaseOrderId=orderRef.id;
 return orderRef.id
}

async function complete(){
 if(!validPhone()||!validPayment())return;
 const button=document.querySelector('button[onclick="complete()"]');
 if(button){button.disabled=true;button.textContent='주문 전송 중...'}
 try{
  state.orderNo=last4();
  await submitMobileOrder();
  state.step='done';render();
  setTimeout(()=>{reset();render()},5000)
 }catch(error){
  console.error(error);
  alert('주문 저장에 실패했습니다. 인터넷 연결을 확인해 주세요.\n'+error.message);
  if(button){button.disabled=false;button.textContent='주문 전송'}
 }
}

document.addEventListener('pointerdown',e=>{

 const r=document.createElement('span');
 r.className='ripple';
 const size=Math.max(target.offsetWidth,target.offsetHeight)*.28;
 r.style.width=r.style.height=size+'px';
 r.style.left=e.clientX+'px';
 r.style.top=e.clientY+'px';
 document.body.appendChild(r);
 setTimeout(()=>r.remove(),520);
},{passive:true});


function playUiTick(){
 try{
  const Ctx=window.AudioContext||window.webkitAudioContext;
  if(!Ctx)return;
  const ctx=window.__pjAudioCtx||(window.__pjAudioCtx=new Ctx());
  const osc=ctx.createOscillator(),gain=ctx.createGain();
  osc.frequency.value=620;gain.gain.value=.018;
  osc.connect(gain);gain.connect(ctx.destination);
  osc.start();gain.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.055);osc.stop(ctx.currentTime+.06)
 }catch(e){}
}
document.addEventListener('click',e=>{
 const b=e.target.closest('button');
 if(b&&!b.disabled&&!b.closest('.keypad'))playUiTick()
},{passive:true});
